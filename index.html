<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הלכה עוברת — טופס דיווח</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  /* ====== הגדרות — הדביקי כאן את כתובת ה-Apps Script ====== */
  :root {
    --purple: #3b2a7a; /* נדגם מהפיקסלים של הפלייר כדי שהטופס יתחבר בלי תפר */
    --purple-dark: #2c1f5c;
    --cream: #f7f2e7;
    --teal: #2a9d8f;
    --brown: #a08657;
    --ink: #3a3193;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--purple);
    color: var(--ink);
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .page {
    width: 100%;
    max-width: 480px;
    background: var(--purple);
    padding-bottom: 48px;
  }
  .page > img.header {
    display: block;
    width: 100%;
    height: auto;
  }
  /* הטופס — המשך ישיר של הפלייר */
  .form-wrap {
    padding: 0 22px;
    margin-top: -6px;
  }
  .form-title {
    text-align: center;
    color: var(--cream);
    margin: 18px 0 20px;
  }
  .form-title h1 {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 0.5px;
  }
  .form-title p {
    font-size: 16px;
    opacity: 0.85;
    margin-top: 4px;
  }
  .card {
    background: var(--cream);
    border-radius: 28px;
    padding: 28px 24px 32px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  }
  .field { margin-bottom: 20px; }
  .field label {
    display: block;
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 7px;
    color: var(--purple);
  }
  .field label .req { color: #c0392b; }
  .field input[type="text"],
  .field textarea {
    width: 100%;
    font-family: 'Heebo', sans-serif;
    font-size: 16px;
    color: var(--purple-dark);
    background: #fff;
    border: 2px solid #ddd3c0;
    border-radius: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--purple); }
  .field textarea { min-height: 110px; resize: vertical; }
  .hint { font-size: 13px; color: var(--brown); margin-top: 5px; }

  /* אישור יישום */
  .confirm {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: #fff;
    border: 2px solid #ddd3c0;
    border-radius: 14px;
    padding: 14px;
    cursor: pointer;
  }
  .confirm input {
    width: 22px; height: 22px;
    accent-color: var(--teal);
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
  }
  .confirm span { font-size: 16px; font-weight: 500; color: var(--purple-dark); }
  .confirm b { color: var(--teal); }

  button.submit {
    width: 100%;
    font-family: 'Heebo', sans-serif;
    font-size: 20px;
    font-weight: 900;
    color: var(--cream);
    background: var(--purple);
    border: none;
    border-radius: 16px;
    padding: 15px;
    cursor: pointer;
    margin-top: 6px;
    transition: background .15s, transform .1s;
  }
  button.submit:hover { background: var(--purple-dark); }
  button.submit:active { transform: scale(0.98); }
  button.submit:disabled { opacity: 0.6; cursor: wait; }

  .msg {
    display: none;
    text-align: center;
    border-radius: 14px;
    padding: 14px;
    margin-top: 16px;
    font-weight: 700;
    font-size: 16px;
  }
  .msg.ok { display: block; background: #e3f4ef; color: #1d6e5f; border: 2px solid var(--teal); }
  .msg.err { display: block; background: #fdecea; color: #a4271a; border: 2px solid #e74c3c; }

  /* מסך תודה */
  .thanks {
    display: none;
    text-align: center;
    padding: 20px 8px;
  }
  .thanks .big { font-size: 48px; }
  .thanks h2 { font-size: 26px; font-weight: 900; color: var(--purple); margin: 10px 0 8px; }
  .thanks p { font-size: 17px; color: var(--purple-dark); }

  .footer-note {
    text-align: center;
    color: var(--cream);
    opacity: 0.7;
    font-size: 13px;
    margin-top: 22px;
  }

  /* ====== גרסת מחשב: הטופס משמאל לתמונה, הכל במסך אחד ====== */
  @media (min-width: 900px) {
    body { height: 100vh; overflow: hidden; }
    .page {
      max-width: none;
      height: 100vh;
      padding-bottom: 0;
      display: flex;
      flex-direction: row; /* RTL: התמונה (ראשונה) מימין, הטופס משמאל */
      align-items: center;
      justify-content: center;
      gap: 48px;
    }
    .page > img.header {
      height: 100vh;
      width: auto;
      flex-shrink: 0;
    }
    .form-wrap {
      margin-top: 0;
      padding: 0;
      width: min(460px, 42vw);
      max-height: 100vh;
      overflow-y: auto;
    }
    .form-title { margin: 10px 0 14px; }
    .form-title h1 { font-size: 24px; }
    .form-title p { font-size: 14px; }
    .card { padding: 20px 22px 22px; border-radius: 22px; }
    .field { margin-bottom: 13px; }
    .field label { font-size: 14px; margin-bottom: 5px; }
    .field input[type="text"], .field textarea { font-size: 14px; padding: 9px 12px; border-radius: 11px; }
    .field textarea { min-height: 64px; }
    .confirm { padding: 10px 12px; border-radius: 11px; }
    .confirm span { font-size: 14px; }
    .hint { font-size: 12px; margin-top: 3px; }
    button.submit { font-size: 17px; padding: 11px; border-radius: 13px; }
    .footer-note { margin-top: 12px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="page">

  <img class="header" src="header.jpeg" alt="רעיון על הדרך — הלכה עוברת">

  <div class="form-wrap">
    <div class="form-title">
      <h1>יישמתי את הרעיון!</h1>
      <p>מדווחות ומתחברות — מלאי את הפרטים:</p>
    </div>

    <div class="card">
      <form id="reportForm">

        <div class="field">
          <label for="teacherName">שם המורה <span class="req">*</span></label>
          <input type="text" id="teacherName" name="teacherName" required autocomplete="name">
        </div>

        <div class="field">
          <label for="schoolName">שם בית הספר <span class="req">*</span></label>
          <input type="text" id="schoolName" name="schoolName" required>
        </div>

        <div class="field">
          <label class="confirm" for="implemented">
            <input type="checkbox" id="implemented" name="implemented" required>
            <span>אני מאשרת שיישמתי את רעיון <b>"הלכה עוברת"</b> עם התלמידות</span>
          </label>
        </div>

        <div class="field">
          <label for="sharing">רציתי להוסיף ש...</label>
          <textarea id="sharing" name="sharing" placeholder="מקום לשיתוף אישי — חוויה, סיפור, רעיון..."></textarea>
        </div>

        <div class="field">
          <label for="fullName">שם מלא לדיווח לרבי <span class="req">*</span></label>
          <input type="text" id="fullName" name="fullName" required>
          <div class="hint">השם ייכלל בדיווח הכללי לרבי</div>
        </div>

        <button type="submit" class="submit" id="submitBtn">שליחת הדיווח</button>
        <div class="msg" id="msg"></div>
      </form>

      <div class="thanks" id="thanks">
        <div class="big">💜</div>
        <h2>הדיווח נקלט בהצלחה!</h2>
        <p>יישר כח על היישום —<br>גם לומדות הלכות וגם שומרות על קשר!</p>
      </div>
    </div>

    <div class="footer-note">רשת חינוך חב"ד · שבילים של הלכה</div>
  </div>
</div>

<script>
  // ====== הדביקי כאן את כתובת ה-Web App מ-Google Apps Script ======
  const SCRIPT_URL = 'PASTE_YOUR_APPS_SCRIPT_URL_HERE';

  const form = document.getElementById('reportForm');
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.className = 'msg';

    if (SCRIPT_URL.startsWith('PASTE')) {
      msg.textContent = 'הטופס עדיין לא חובר לגוגל שיטס — יש להדביק את כתובת ה-Script בקובץ.';
      msg.classList.add('err');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'שולח...';

    const data = new URLSearchParams({
      teacherName: form.teacherName.value.trim(),
      schoolName: form.schoolName.value.trim(),
      implemented: form.implemented.checked ? 'כן' : 'לא',
      sharing: form.sharing.value.trim(),
      fullName: form.fullName.value.trim()
    });

    try {
      await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: data });
      form.style.display = 'none';
      document.getElementById('thanks').style.display = 'block';
    } catch (err) {
      msg.textContent = 'אירעה שגיאה בשליחה. נסי שוב בעוד רגע.';
      msg.classList.add('err');
      btn.disabled = false;
      btn.textContent = 'שליחת הדיווח';
    }
  });
</script>
</body>
</html>
